<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Side-a-Lama — Comments</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<div th:replace="fragments::header"></div>

<main class="container menu-page">

    <section class="menu-hero">
        <div class="menu-emoji">💬</div>
        <h1 class="menu-title">Comments</h1>
        <p class="menu-sub">See what players think about Side-a-Lama</p>
    </section>

    <section class="comments-page-panel">

        <div class="comments-stats">
            <div class="stat-chip">
                <span class="stat-icon">📝</span>
                <span th:text="${#lists.size(comments)} + ' comments'">0 comments</span>
            </div>
            <div class="stat-chip">
                <span class="stat-icon">⭐</span>
                <span th:text="'Avg rating: ' + ${averageRating} + '/5'">Avg rating: 0/5</span>
            </div>
        </div>

        <ul class="comments-list" id="comments-list">
            <li th:if="${#lists.isEmpty(comments)}" class="empty">No comments yet.</li>
            <li th:each="comment : ${comments}" class="comment-item">
                <div class="comment-stars-wrapper">
            <span class="comment-true-stars" th:if="${commentRatings[comment.player] > 0}">
                <span class="true-star" th:each="i : ${#numbers.sequence(1, commentRatings[comment.player])}">★</span>
            </span>
                    <span class="comment-false-stars" th:if="${commentRatings[comment.player] < 5}">
                <span th:each="i : ${#numbers.sequence(1, 5 - commentRatings[comment.player])}">☆</span>
            </span>
                    <span class="comment-date2" th:text="${#dates.format(comment.playedOn, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
                <div class="comment-head">
                    <span class="comment-author" th:text="${comment.player}">anonymous</span>
                </div>
                <div class="comment" th:text="${comment.comments}"></div>

                <div th:if="${replies != null and replies[comment.ident] != null and !#lists.isEmpty(replies[comment.ident])}">
                    <button class="btn btn-ghost btn-sm reply-toggle2"
                            th:attr="onclick='toggleReplies(' + ${comment.ident} + ')'">
                        ▼ <span th:text="${#lists.size(replies[comment.ident])}"></span>
                    </button>
                    <div class="replies-body" th:id="'replies-' + ${comment.ident}" style="display:none">
                        <div class="replies">
                            <div th:each="reply : ${replies[comment.ident]}" class="reply-item">
                                <div class="reply-header">
                                    <span class="reply-author" th:text="${reply.player}">anonymous</span>
                                    <span class="reply-date" th:text="${#dates.format(reply.playedOn, 'yyyy-MM-dd HH:mm')}"></span>
                                </div>
                                <div class="reply-text" th:text="${reply.additionalComment}"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </li>
        </ul>

        <div class="comment-page-actions">
            <a href="/sidealama/Choose" class="btn btn-primary">Play & Comment</a>
            <a href="/" class="btn btn-ghost">Home</a>
        </div>

    </section>

</main>

<div th:replace="fragments::footer"></div>
<script>
    function toggleReplies(ident) {
        const body = document.getElementById('replies-' + ident);
        body.style.display = body.style.display === 'none' ? 'block' : 'none';
    }
</script>
</body>
</html>
