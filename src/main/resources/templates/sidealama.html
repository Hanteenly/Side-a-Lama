<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Side-a-Lama</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<div th:replace="fragments::header"></div>

<main class="container g">

    <section class="hero">
        <h1 class="game-title">Side-a-Lama</h1>
        <p class="subtitle">Push tiles, match three, win points.</p>
    </section>

    <section class="status-row">
        <form class="name-form" action="/sidealama/save" method="post">
            <label>Player1: </label>
            <span th:text="${player1Name}">Player1</span>

            <label class="player2">Player2: </label>
            <span th:text="${player2Name}">Player2</span>

            <button type="submit" class="btn btn-ghost save">Save</button>
        </form>


        <div class="status-pills">

            <span class="pill">Turn: <strong th:text="${currentPlayer}"></strong></span>
            <span class="pill">State: <strong th:text="${state}">PLAYING</strong></span>
        </div>
    </section>

    <section class="score-row">
        <div class="score-card">
            <div class="score-label" th:text="${player1Name}">Player 1</div>
            <div class="score-value" th:text="${score1}">500</div>
        </div>

        <div class="next-tile-card">
            <div class="score-label">Next</div>
            <div class="tile next" th:text="${nextTile}">?</div>
        </div>

        <div class="score-card">
            <div class="score-label" th:text="${player2Name}" >Player 2</div>
            <div class="score-value" th:text="${score2}">500</div>
        </div>
    </section>

    <section class="board-section" id="board-section"></section>

    <div class="game-over-overlay">
        <div class="game-over-box">
            <div class="game-over-message">
                <h2 th:text="${currentPlayer}"> </h2>
                <h2>. won! 🎉</h2>
            </div>
            <a href="/sidealama/Choose" class="btn btn-play">Play again</a>
        </div>
    </div>

    <div class="actions">
        <a href="/sidealama/Choose" class="btn btn-ghost">New Game</a>
        <a href="/" class="btn btn-ghost">Home</a>
    </div>
    

    <section class="panel">
        <h2>Rating</h2>
        <div class="rating-row">
            <div class="avg-rating">
                <div class="score-label">Average</div>
                <div class="avg-value" th:text="${averageRating != null} ? ${averageRating} : '—'">0</div>
            </div>

            <div class="your-rating">
                <div class="score-label">Your rating</div>
                <form action="/sidealama/rating" method="post" class="star-form" id="rating-form">
                    <input type="radio" id="r5" name="rating" value="5" th:checked="${playerRating == 5}"/><label for="r5">★</label>
                    <input type="radio" id="r4" name="rating" value="4" th:checked="${playerRating == 4}"/><label for="r4">★</label>
                    <input type="radio" id="r3" name="rating" value="3" th:checked="${playerRating == 3}"/><label for="r3">★</label>
                    <input type="radio" id="r2" name="rating" value="2" th:checked="${playerRating == 2}"/><label for="r2">★</label>
                    <input type="radio" id="r1" name="rating" value="1" th:checked="${playerRating == 1}"/><label for="r1">★</label>

                </form>
                <div class="your-current" th:if="${playerRating != null and playerRating > 0}">
                    You rated <strong th:text="${playerRating}">3</strong>/5
                </div>
            </div>
        </div>
    </section>

    <section class="panel" id="comments">
        <div class="panel-header">
            <h2>Comments</h2>
        </div>
        <div class="panel-body">
            <form action="/sidealama/comment" method="post" class="comment-form">
                <input type="text" name="content" class="post" maxlength="65" placeholder="Your comment…" required/>
                <button type="submit" class="btn btn-primary">Post</button>
            </form>
            <button class="btn btn-ghost btn-sm" onclick="toggleComments()" id="toggle-btn">▲</button>
        </div>
        <ul class="comments-list" id="comments-list">
            <li th:if="${#lists.isEmpty(comments)}" class="empty">No comments yet.</li>
            <li th:each="comment : ${comments}" class="comment-item">
                <div class="comment-stars-wrapper">
        <span class="comment-true-stars" th:if="${commentRatings[comment.player] > 0}">
            <span class="true-star" th:each="i : ${#numbers.sequence(1, commentRatings[comment.player])}">★</span>
        </span>
                    <span class="comment-false-stars" th:if="${commentRatings[comment.player] < 5}">
                        <span th:if="${commentRatings[comment.player] > 0}">
            <span th:each="i : ${#numbers.sequence(1, 5 - commentRatings[comment.player])}">☆</span>
                        </span>
        </span>
                    <span class="comment-date" th:text="${#dates.format(comment.playedOn, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
                <div class="comment-head">
                    <span class="comment-author" th:text="${comment.player}">anonymous</span>
                </div>
                <div class="comment" th:text="${comment.comments}"></div>

                <div class="replies-section">
                    <button class="btn btn-ghost btn-sm reply-toggle" onclick="toggleRepliesAndForm(this)">
                        ↩ Reply <span th:if="${replies[comment.ident] != null and !#lists.isEmpty(replies[comment.ident])}"
                          th:text="'▼ ' + ${#lists.size(replies[comment.ident])}">
                    </span>
                    </button>

                    <div class="replies-body" style="display:none">
                        <div class="replies" th:if="${replies[comment.ident] != null and !#lists.isEmpty(replies[comment.ident])}">
                            <div th:each="reply : ${replies[comment.ident]}" class="reply-item">
                                <div class="reply-header">
                                    <span class="reply-author" th:text="${reply.player}">anonymous</span>
                                    <span class="reply-date" th:text="${#dates.format(reply.playedOn, 'yyyy-MM-dd HH:mm')}"></span>
                                </div>
                                <div class="reply-text" th:text="${reply.additionalComment}"></div>
                            </div>
                        </div>
                        <form action="/sidealama/reply" method="post" class="reply-form">
                            <input type="hidden" name="commentId" th:value="${comment.ident}"/>
                            <input type="text" name="content" placeholder="Your reply…" maxlength="65" required/>
                            <button type="submit" class="btn ">Send</button>
                        </form>
                    </div>
                </div>
            </li>
        </ul>
    </section>

    <script>
        async function makeMove(dir, index) {
            const res = await fetch(`/sidealama/move?dir=${dir}&index=${index}`);
            const data = await res.json();
            updateUI(data);
        }

        async function loadState() {
            const res = await fetch('/sidealama/state');
            const data = await res.json();
            updateUI(data);
        }

        function updateUI(data) {
            document.querySelector('.score-card:first-child .score-value').textContent = data.score1;
            document.querySelector('.score-card:last-child .score-value').textContent = data.score2;
            document.querySelector('.pill strong:first-child') &&
            (document.querySelectorAll('.pill strong')[0].textContent = data.currentPlayer);
            document.querySelector('.tile.next').textContent = data.nextTile;

            renderBoard(data.board);

            if (data.state !== 'PLAYING') {
                document.querySelector('.game-over-overlay').style.display = 'flex';
            }
        }

        function renderBoard(board) {
            const section = document.getElementById('board-section');
            const rows = board.length;
            const cols = board[0].length;

            let html = "<table class='game-board'><tr><td></td>";
            for (let col = 0; col < cols; col++) {
                html += `<td class='arrow-cell'>
            <button class='arrow-button' onclick="makeMove('TOP', ${col})">▼</button>
        </td>`;
            }
            html += "<td></td></tr>";

            for (let row = 0; row < rows; row++) {
                html += "<tr>";
                html += `<td class='arrow-cell'>
            <button class='arrow-button' onclick="makeMove('LEFT', ${row})">▶</button>
        </td>`;
                for (let col = 0; col < cols; col++) {
                    html += `<td class='tile-cell'><span class='tile'>${board[row][col]}</span></td>`;
                }
                html += `<td class='arrow-cell'>
            <button class='arrow-button' onclick="makeMove('RIGHT', ${row})">◀</button>
        </td>`;
                html += "</tr>";
            }
            html += "</table>";
            section.innerHTML = html;
        }

        function toggleComments() {
            const list = document.getElementById('comments-list');
            const btn = document.getElementById('toggle-btn');
            if (list.style.display === 'none') {
                list.style.display = 'block';
                btn.textContent = '▲';
            } else {
                list.style.display = 'none';
                btn.textContent = '▼';
            }
        }
        window.addEventListener('load', loadState);

        document.querySelectorAll('.arrow-button').forEach(btn => {
            btn.addEventListener('click', () => {
                sessionStorage.setItem('scrollY', window.scrollY);
            });
        });

        window.addEventListener('load', () => {
            const y = sessionStorage.getItem('scrollY');
            if (y !== null) {
                window.scrollTo(0, parseInt(y));
                sessionStorage.removeItem('scrollY');
            }
        });
        document.querySelectorAll('#rating-form input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', () => {
                fetch('/sidealama/rating', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `rating=${radio.value}`
                });
            });
        });
        function toggleRepliesAndForm(btn) {
            const body = btn.nextElementSibling;
            const isHidden = body.style.display === 'none';
            body.style.display = isHidden ? 'block' : 'none';
        }
    </script>

</main>

<div th:replace="fragments::footer"></div>
</body>
</html>
